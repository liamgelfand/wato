version: '3.9'

services:
  # PostgreSQL Database (Development)
  db:
    image: postgres:14-alpine
    container_name: darescore-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: darescore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - darescore-dev-network

  # Development doesn't run app in container - use local npm run dev
  # This is just the database for local development

networks:
  darescore-dev-network:
    driver: bridge

volumes:
  postgres_data_dev:
    driver: local
