# Kubernetes Deployment Configuration for DareScore
# 
# Prerequisites:
# - Kubernetes cluster (GKE, EKS, AKS, or self-hosted)
# - kubectl configured
# - Docker image pushed to registry
#
# Usage:
#   kubectl apply -f deploy/kubernetes.yml

---
# ConfigMap for environment variables
apiVersion: v1
kind: ConfigMap
metadata:
  name: darescore-config
  namespace: default
data:
  NODE_ENV: "production"
  STORAGE_PROVIDER: "s3"
  PORT: "3000"

---
# Secret for sensitive data
# Create with: kubectl create secret generic darescore-secrets --from-literal=...
apiVersion: v1
kind: Secret
metadata:
  name: darescore-secrets
  namespace: default
type: Opaque
# Add your secrets:
# data:
#   DATABASE_URL: <base64-encoded>
#   NEXTAUTH_SECRET: <base64-encoded>
#   AWS_ACCESS_KEY_ID: <base64-encoded>
#   AWS_SECRET_ACCESS_KEY: <base64-encoded>

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: darescore
  namespace: default
  labels:
    app: darescore
spec:
  replicas: 3
  selector:
    matchLabels:
      app: darescore
  template:
    metadata:
      labels:
        app: darescore
    spec:
      containers:
        - name: darescore
          image: ghcr.io/your-username/darescore:latest  # Update this
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              protocol: TCP
          
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: darescore-config
                  key: PORT
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: darescore-config
                  key: NODE_ENV
            - name: STORAGE_PROVIDER
              valueFrom:
                configMapKeyRef:
                  name: darescore-config
                  key: STORAGE_PROVIDER
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: darescore-secrets
                  key: DATABASE_URL
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: darescore-secrets
                  key: NEXTAUTH_SECRET
            - name: NEXTAUTH_URL
              valueFrom:
                secretKeyRef:
                  name: darescore-secrets
                  key: NEXTAUTH_URL
          
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          
          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 30

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: darescore-service
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: darescore
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: darescore-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: darescore
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# Ingress (optional - for custom domain with SSL)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: darescore-ingress
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - yourdomain.com
      secretName: darescore-tls
  rules:
    - host: yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: darescore-service
                port:
                  number: 80
