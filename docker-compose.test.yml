version: '3.9'

services:
  # Test Database
  db-test:
    image: postgres:14-alpine
    container_name: darescore-db-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: testpassword
      POSTGRES_DB: darescore_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - darescore-test-network
    tmpfs:
      - /var/lib/postgresql/data

  # Test Runner (for e2e tests)
  app-test:
    build:
      context: .
      dockerfile: Dockerfile.test
      target: test
    container_name: darescore-app-test
    depends_on:
      db-test:
        condition: service_healthy
    environment:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:testpassword@db-test:5432/darescore_test
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: test-secret-key-for-testing-only
    networks:
      - darescore-test-network
    command: npm run test:e2e

networks:
  darescore-test-network:
    driver: bridge
